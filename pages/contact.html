<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEG Dev Studios</title>
    <link rel="stylesheet" href="/index.css">
    <link rel="stylesheet" href="/styles/contact.css">
  </head>
  <body>
    <header>
        <div class="container-logo">
            <img src="/recources/img/logo/logoredondogris.png" alt="Logo de la empresa">
            <h1>JEG Dev Studios</h1>
        </div>
        <nav class="dropdown">
            <button class="dropbtn">
                Menu
            </button>
            <ul>
                <li class="dropdown-content">
                    <a class="active" href="/index.html">Inicio</a>
                </li>
                <li class="dropdown-content">
                    <a class="active" href="/pages/services.html">Servicios</a>
                </li>
                <li class="dropdown-content" style="display: none;">
                    <a class="active" href="/pages/proyects.html">Proyectos</a>
                </li>
                <li class="dropdown-content">
                    <a class="active" href="/pages/aboutus.html">Sobre Nosotros</a>
                </li>
                <li class="dropdown-content" style="display: none;">
                    <a class="active" href="/pages/blog.html">Blog</a>
                </li>
                <li class="dropdown-content">
                    <a class="active" href="/pages/contact.html">Contacto</a>
                </li>
            </ul>
        </nav>
    </header>
    <section class="form-section">
        <article class="article1">
            <div class="contact-form">
                <h2>Formulario de Contacto</h2>
                <form action="/submit_form" method="POST">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" required>
            
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" required>
            
                    <label for="type">Tipo de Consulta</label>
                    <select id="type" name="type" required>
                        <option value="services">Servicios</option>
                        <option value="support">Soporte</option>
                        <option value="general">General</option>
                    </select>
            
                    <label for="message">Mensaje</label>
                    <textarea id="message" name="message" rows="4" required></textarea>
            
                    <button type="submit">Enviar</button>
                </form>
            </div>
        </article>
        <article class="article2">
            <div class="container-principal">
                <div class="container-title">
                    <h1>Ó</h1>
                </div>
            </div>
        </article>
        <aside>
            <div class="container-principal">
                <div class="container-title">
                    <h1>Contactanos por redes sociales</h1>
                </div>
                <ul>
                    <li>
                        <a href="https://www.facebook.com/profile.php?id=61559431238008">
                            <img src="#" alt="icono de Facebook">
                        </a>
                    </li>
                    <li>
                        <a href="#">
                            <img src="#" alt="icono de WhatsApp">
                        </a>
                    </li>
                </ul>
            </div>
        </aside>
    </section>
    <footer>
        <p>&copy; 2024 JEG Dev Studios. Todos los derechos reservados.</p>
    </footer>
  </body>
</html>
